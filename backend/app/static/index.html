<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM MVP</title>
  </head>
  <body>
    <h1>Hello world</h1>
    <p id="status">Checking API...</p>
    <script>
      fetch("/api/health")
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("status").textContent =
            "API status: " + data.status;
        })
        .catch(() => {
          document.getElementById("status").textContent = "API call failed";
        });
    </script>
  </body>
</html>
