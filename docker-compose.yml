services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/pm.db
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET must be set}
    volumes:
      - pmdata:/app/data

volumes:
  pmdata:
